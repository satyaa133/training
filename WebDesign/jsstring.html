<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript String</title>
</head>
<body>
    <h2>Compare Two Strings</h2>

    <div class="form-group">
        <label for="str1">First String:</label>
        <input type="text" id="str1" placeholder="Enter text...">
    </div>

    <div class="form-group">
        <label for="str2">Second String:</label>
        <input type="text" id="str2" placeholder="Enter text...">
    </div>

    <button onclick="compareStrings()">Compare</button>

    <div id="result"></div>

    <script>
        function compareStrings() {
            const string1 = document.getElementById('str1').value;
            const string2 = document.getElementById('str2').value;
            const resultDiv = document.getElementById('result');

            if (string1 === "" || string2 === "") {
                alert("Please fill in both fields.");
                return;
            }

            if (string1 === string2) {
                alert("Match ho gya");
            } else {
                alert("Andha h kya...");
            }
        }
    </script>
</body>
</html>
