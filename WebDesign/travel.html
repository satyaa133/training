<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Booking Form</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(160deg, #dbe9f8 0%, #8799b8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 380px;
            max-width: 100%;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 22px 45px rgba(15, 23, 42, 0.14);
            padding: 32px;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 1.8rem;
            text-align: center;
            color: #1f3251;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #475569;
            font-size: 0.95rem;
        }

        .glass-form {
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0;
            box-shadow: none;
        }

        input,
        button {
            width: 100%;
            padding: 14px 1px;
            margin-bottom: 18px;
            border: 1px solid #d1d9e6;
            border-radius: 16px;
            font-size: 1rem;
            background: #f4f7fb;
            color: #1f3251;
        }

        input:focus {
            outline: none;
            border-color: #7b9ed9;
            box-shadow: 0 0 0 4px rgba(45, 108, 223, 0.12);
        }

        button {
            background-color: #2d6cdf;
            color: #ffffff;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #2558b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Travel Booking</h1>
        <form class="glass-form">
            <label for="from">From</label>
            <input type="text" id="from" name="from" placeholder="Departure city" required>

            <label for="to">To</label>
            <input type="text" id="to" name="to" placeholder="Destination city" required>

            <label for="departure">Departure date</label>
            <input type="date" id="departure" name="departure" required>

            <label for="return">Return date</label>
            <input type="date" id="return" name="return">

            <button type="submit">Book now</button>
        </form>
    </div>
</body>
</html>
